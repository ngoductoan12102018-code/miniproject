<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <title>Hot Trend</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<header>
    <nav>
        <a href="index.html">Trang chủ</a> >
        <a href="hot.html">Hot Trend</a>
    </nav>
</header>

<body>
    <section class="products-nav">
        <div class="section-top">
            <h1>SẢN PHẨM HOT TREND</h1>
            <div class="product-type">
                <button class="classify1" id="all-product">Tất cả</button>
                <button class="classify1" id="clothes">Quần áo</button>
                <button class="classify1" id="accessory">Phụ kiện</button>
                <button class="classify1" id="shoes">Giày dép</button>
            </div>
            <div class="filter-price">
                <input type="number" id="minPrice" placeholder="Từ">
                <input type="number" id="maxPrice" placeholder="Đến">
                <button id="filter" onclick="filterByPrice()">Lọc</button>
            </div>
            <div class="sort">
                <span>Giá <button id="ascending">↑</button>
                    <button id="descending">↓</button></span>
            </div>

        </div>
        <div class="product-container"></div>
    </section>




    <script src="script.js"></script>
</body>

</html>
